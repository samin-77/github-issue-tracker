<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <div id="login-page" class="flex items-center justify-center min-h-screen">
        <div class="card w-96 bg-base-100 shadow-2xl border border-base-300">
            <div class="card-body items-center text-center p-10">
                <i class="fa-brands fa-github text-6xl mb-4"></i>
                <h2 class="card-title text-2xl font-black">Sign In</h2>
                <p class="text-sm opacity-60">Issue Tracker</p>
                <form id="login-form" class="w-full mt-6 space-y-4">
                    <input type="text" id="username" placeholder="Username" class="input input-bordered w-full font-semibold" required />
                    <input type="password" id="password" placeholder="Password" class="input input-bordered w-full font-semibold" required />
                    <button type="submit" class="btn btn-primary w-full font-bold">Sign In</button>
                </form>
                <div class="mt-6 p-4 bg-info/10 rounded-xl text-xs text-info w-full border border-info/20 font-bold uppercase tracking-wider">
                    admin / admin123
                </div>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <nav class="navbar bg-white shadow-sm px-4 lg:px-20 border-b border-base-300 sticky top-0 z-50 h-20">
            <div class="flex-1 flex flex-col items-start">
                <div class="flex items-center gap-2">
                    <i class="fa-brands fa-github text-2xl"></i>
                    <a class="text-xl font-black tracking-tighter">IssueTracker</a>
                </div>
                <span class="text-[10px] uppercase tracking-widest opacity-40 font-black ml-8 -mt-1">by Ishfak Mahbub Samin</span>
            </div>
            <div class="flex-none gap-4">
                <label class="swap swap-rotate btn btn-ghost btn-circle btn-sm">
                    <input type="checkbox" id="theme-toggle" />
                    <i class="fa-solid fa-sun swap-on text-warning"></i>
                    <i class="fa-solid fa-moon swap-off text-info"></i>
                </label>
                <div class="join hidden md:flex">
                    <input id="search-input" class="input input-bordered join-item input-sm w-64" placeholder="Search issues..."/>
                    <button id="search-btn" class="btn join-item btn-sm btn-primary">Search</button>
                </div>
                <button onclick="logout()" class="btn btn-ghost btn-sm text-error font-black uppercase">Logout</button>
            </div>
        </nav>

        <main class="container mx-auto p-4 lg:p-10">
            <div class="mb-10">
                <h1 id="view-title" class="text-5xl font-black tracking-tighter mb-8">All Issues</h1>
                
                <div class="flex flex-col md:flex-row justify-between items-center p-8 bg-white rounded-[2rem] border border-base-300 shadow-sm gap-6">
                    <div class="flex items-center gap-6">
                        <div class="bg-primary text-white p-5 rounded-2xl shadow-xl shadow-primary/20">
                            <i class="fa-solid fa-layer-group text-2xl"></i>
                        </div>
                        <div>
                            <div class="flex items-baseline gap-2">
                                <span class="text-5xl font-black" id="dynamic-count">0</span>
                                <span class="text-2xl font-bold opacity-30" id="dynamic-text">Issues</span>
                            </div>
                            <p class="text-sm text-gray-400 font-bold uppercase tracking-tighter">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex gap-6">
                        <div class="flex items-center gap-3 bg-base-200/50 px-5 py-3 rounded-2xl border border-base-300">
                            <span class="w-3 h-3 bg-green-500 pulse-green"></span>
                            <span class="text-xs font-black opacity-60 uppercase">Open</span>
                        </div>
                        <div class="flex items-center gap-3 bg-base-200/50 px-5 py-3 rounded-2xl border border-base-300">
                            <span class="w-3 h-3 bg-purple-500 pulse-purple"></span>
                            <span class="text-xs font-black opacity-60 uppercase">Closed</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 border-b border-base-300">
                <div class="tabs tabs-bordered">
                    <a onclick="filterIssues('all')" id="tab-all" class="tab tab-active h-12 px-8 font-bold">All Issues</a> 
                    <a onclick="filterIssues('open')" id="tab-open" class="tab h-12 px-8 font-bold">Open</a> 
                    <a onclick="filterIssues('closed')" id="tab-closed" class="tab h-12 px-8 font-bold">Closed</a>
                </div>
                
                <div class="flex items-center gap-8 pb-4 md:pb-0">
                    <div class="text-center">
                        <span id="open-count" class="block text-xl font-black text-green-600 leading-none">0</span>
                        <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Active</span>
                    </div>
                    <div class="text-center">
                        <span id="closed-count" class="block text-xl font-black text-purple-600 leading-none">0</span>
                        <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Resolved</span>
                    </div>
                </div>
            </div>

            <div id="loader" class="flex flex-col items-center justify-center my-32 hidden">
                <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>

            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </main>
    </div>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box bg-white border border-base-300 shadow-2xl">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4 z-10">✕</button>
            </form>
            <div id="modal-content"></div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
