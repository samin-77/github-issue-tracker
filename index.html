<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="login-page" class="flex items-center justify-center min-h-screen">
        <div class="card w-96 bg-base-100 shadow-xl border">
            <div class="card-body items-center text-center">
                <i class="fa-brands fa-github text-5xl mb-2"></i>
                <h2 class="card-title text-2xl font-bold">Sign In</h2>
                <p class="text-sm text-gray-500">Enter your details to access the tracker</p>
                
                <form id="login-form" class="w-full mt-4 space-y-4">
                    <input type="text" id="username" placeholder="Username" class="input input-bordered w-full" required />
                    <input type="password" id="password" placeholder="Password" class="input input-bordered w-full" required />
                    <button type="submit" class="btn btn-primary w-full">Sign In</button>
                </form>

                <div class="mt-6 p-3 bg-blue-50 rounded-lg text-xs text-blue-700 w-full">
                    <p class="font-bold">Demo Credentials:</p>
                    <p>User: admin | Pass: admin123</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <div class="navbar bg-base-100 shadow-md px-4 lg:px-20">
            <div class="flex-1">
                <a class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-brands fa-github"></i> IssueTracker
                </a>
            </div>
            <div class="flex-none gap-2">
                <div class="join">
                    <input id="search-input" class="input input-bordered join-item input-sm md:input-md w-32 md:w-auto" placeholder="Search issues..."/>
                    <button id="search-btn" class="btn join-item btn-sm md:btn-md btn-primary">Search</button>
                </div>
                <button onclick="logout()" class="btn btn-ghost btn-sm">Logout</button>
            </div>
        </div>

        <main class="container mx-auto p-4 lg:p-10">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <div class="tabs tabs-boxed bg-white border">
                    <a onclick="filterIssues('all')" id="tab-all" class="tab tab-active">All</a> 
                    <a onclick="filterIssues('open')" id="tab-open" class="tab">Open</a> 
                    <a onclick="filterIssues('closed')" id="tab-closed" class="tab">Closed</a>
                </div>
                <div class="flex items-center gap-4 text-sm font-medium">
                    <span class="text-green-600"><i class="fa-regular fa-circle-dot mr-1"></i> <span id="open-count">0</span> Open</span>
                    <span class="text-purple-600"><i class="fa-solid fa-check mr-1"></i> <span id="closed-count">0</span> Closed</span>
                </div>
            </div>

            <div id="loader" class="flex justify-center my-20">
                <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>

            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </main>
    </div>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <div id="modal-content">
                </div>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
