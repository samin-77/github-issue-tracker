<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Ishfak Mahbub Samin</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .pulse-green { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); animation: pulse-g 2s infinite; border-radius: 50%; }
        .pulse-purple { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.7); animation: pulse-p 2s infinite; border-radius: 50%; }
        @keyframes pulse-g { 0% { transform: scale(0.95); } 70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); } }
        @keyframes pulse-p { 0% { transform: scale(0.95); } 70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(168, 85, 247, 0); } 100% { transform: scale(0.95); } }
        
        .tab-active { font-weight: 800 !important; border-bottom: 3px solid #3b82f6 !important; background: transparent !important; }
        .card-github { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-github:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-base-200 min-h-screen">

    <div id="login-page" class="flex items-center justify-center min-h-screen">
        <div class="card w-96 bg-base-100 shadow-2xl border border-base-300">
            <div class="card-body items-center text-center">
                <i class="fa-brands fa-github text-6xl mb-2"></i>
                <h2 class="card-title text-2xl font-bold">Sign In</h2>
                <p class="text-sm opacity-60">GitHub Issues Tracker</p>
                <form id="login-form" class="w-full mt-4 space-y-4">
                    <input type="text" id="username" placeholder="Username" class="input input-bordered w-full" required />
                    <input type="password" id="password" placeholder="Password" class="input input-bordered w-full" required />
                    <button type="submit" class="btn btn-primary w-full">Sign In</button>
                </form>
                <div class="mt-6 p-4 bg-info/10 rounded-lg text-xs text-info w-full border border-info/20">
                    <p class="font-bold">Demo: admin / admin123</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <nav class="navbar bg-base-100 shadow-sm px-4 lg:px-20 border-b border-base-300 sticky top-0 z-50">
            <div class="flex-1 flex flex-col items-start">
                <div class="flex items-center gap-2">
                    <i class="fa-brands fa-github text-2xl"></i>
                    <a class="text-xl font-black tracking-tight">IssueTracker</a>
                </div>
                <span class="text-[10px] uppercase tracking-widest opacity-50 font-bold ml-8">by Ishfak Mahbub Samin</span>
            </div>
            <div class="flex-none gap-3">
                <label class="swap swap-rotate btn btn-ghost btn-circle btn-sm">
                    <input type="checkbox" id="theme-toggle" />
                    <i class="fa-solid fa-sun swap-on text-warning"></i>
                    <i class="fa-solid fa-moon swap-off text-info"></i>
                </label>
                <div class="join hidden md:flex">
                    <input id="search-input" class="input input-bordered join-item input-sm" placeholder="Search..."/>
                    <button id="search-btn" class="btn join-item btn-sm btn-primary">Search</button>
                </div>
                <button onclick="logout()" class="btn btn-ghost btn-sm text-error font-bold">Logout</button>
            </div>
        </nav>

        <main class="container mx-auto p-4 lg:p-10">
            <div class="mb-8">
                <h1 id="view-title" class="text-4xl font-black mb-6">All Issues</h1>
                
                <div class="flex flex-col md:flex-row justify-between items-center p-8 bg-base-100 rounded-3xl border border-base-300 shadow-sm gap-6">
                    <div class="flex items-center gap-5">
                        <div class="bg-primary text-primary-content p-4 rounded-2xl shadow-lg">
                            <i class="fa-solid fa-layer-group text-2xl"></i>
                        </div>
                        <div>
                            <div class="flex items-baseline gap-2">
                                <span class="text-4xl font-black" id="dynamic-count">0</span>
                                <span class="text-xl font-bold opacity-80" id="dynamic-text">Issues</span>
                            </div>
                            <p class="text-sm text-gray-500 font-medium">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex gap-8">
                        <div class="flex items-center gap-3 bg-base-200 px-4 py-2 rounded-full border border-base-300">
                            <span class="w-3 h-3 bg-green-500 pulse-green"></span>
                            <span class="text-xs font-black opacity-70">OPEN</span>
                        </div>
                        <div class="flex items-center gap-3 bg-base-200 px-4 py-2 rounded-full border border-base-300">
                            <span class="w-3 h-3 bg-purple-500 pulse-purple"></span>
                            <span class="text-xs font-black opacity-70">CLOSED</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                <div class="tabs tabs-lifted">
                    <a onclick="filterIssues('all')" id="tab-all" class="tab tab-active px-6">All</a> 
                    <a onclick="filterIssues('open')" id="tab-open" class="tab px-6">Open</a> 
                    <a onclick="filterIssues('closed')" id="tab-closed" class="tab px-6">Closed</a>
                </div>
                
                <div class="flex items-center gap-6 bg-base-100 p-2 px-4 rounded-xl border border-base-300 shadow-sm">
                    <div class="flex items-center gap-2 text-green-600 font-black">
                        <i class="fa-regular fa-circle-dot"></i>
                        <span id="open-count">0</span>
                    </div>
                    <div class="divider divider-horizontal mx-0"></div>
                    <div class="flex items-center gap-2 text-purple-600 font-black">
                        <i class="fa-solid fa-circle-check"></i>
                        <span id="closed-count">0</span>
                    </div>
                </div>
            </div>

            <div id="loader" class="flex flex-col items-center justify-center my-20 hidden">
                <span class="loading loading-infinity loading-lg text-primary"></span>
            </div>

            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box bg-base-100 border border-base-300 max-w-2xl rounded-3xl">
            <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4">✕</button></form>
            <div id="modal-content"></div>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
